<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploads Directory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 { color: #333; }
        .info { 
            background: #f0f0f0; 
            padding: 15px; 
            border-radius: 5px;
            margin: 20px 0;
        }
        code {
            background: #ddd;
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Uploads Directory</h1>
    <div class="info">
        <p>This is the file upload directory. Use the following command to upload a file:</p>
        <code>curl -X POST -d "content" http://localhost:8080/upload</code>
    </div>
    <p>Files uploaded to this server will appear here.</p>
</body>
</html>
